# Public lead intake — product landing pages (WorkSync "Request a Demo", etc.)
# POST leads directly from the browser with no Supabase JWT, so the gateway must
# be open. No key is exposed in any product's frontend bundle.
[functions.web-lead-intake]
verify_jwt = false

# Invoked by the cron Worker and by web-lead-intake's instant-dispatch kick.
# Open the gateway so the kick (which can't present a legacy JWT) reaches it;
# it takes no sensitive input and is idempotent + billing/window-gated internally.
[functions.pipeline-action-dispatcher]
verify_jwt = false

# Invoked internally by ai-bolna-webhook / exotel-webhook (post-call follow-up
# messages). Those callers present the sb_secret_ service key, which the gateway
# rejects on verify_jwt=true — so the demo confirmation + intro messages were
# silently 401ing. Idempotent (customer_message_sent_at guard).
[functions.send-post-call-message]
verify_jwt = false

